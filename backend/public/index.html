<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Live Tracking PoC</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .panel {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .victim-panel {
            background-color: #ffebee;
            border: 2px solid #ef5350;
        }

        .helper-panel {
            background-color: #e8f5e9;
            border: 2px solid #66bb6a;
        }

        .room-controls {
            background-color: #e3f2fd;
            border: 2px solid #64b5f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 5px 0;
            cursor: pointer;
            font-weight: bold;
        }

        input {
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            width: 150px;
            text-align: center;
        }

        #log {
            background: #333;
            color: #0f0;
            padding: 10px;
            height: 150px;
            overflow-y: scroll;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <h2>SOS Live Tracking PoC</h2>
    <p><strong>Server Status:</strong> <span id="connection-status" style="color: red;">Disconnected</span></p>

    <div class="room-controls">
        <h3>🔑 Incident Room ID</h3>
        <p><em>Generate a random ID, or paste one here to connect to an existing emergency.</em></p>
        <input type="text" id="room-id-input" value="999">
        <button onclick="generateRandomId()">Generate Random ID</button>
    </div>

    <div class="panel victim-panel">
        <h3>🚨 Victim Dashboard</h3>
        <button onclick="joinAsVictim()">1. Join Incident as Victim</button>
        <p><strong>Helper's Live Location:</strong></p>
        <div id="log">Waiting for helper location...<br></div>
    </div>

    <div class="panel helper-panel">
        <h3>🏃 Helper Dashboard</h3>
        <button onclick="joinAsHelper()">1. Join Incident as Helper</button>
        <button onclick="startRunning()">2. Start Running to Victim (Send GPS)</button>
        <p id="helper-status">GPS Status: Idle</p>
    </div>

    <script>
        const socket = io('http://localhost:3000');
        let simulationInterval;

        // Helper function to get the current ID from the input box
        function getIncidentId() {
            return document.getElementById('room-id-input').value;
        }

        // Generates a random 6-digit number to simulate MongoDB creating a unique ID
        function generateRandomId() {
            const randomId = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('room-id-input').value = randomId;
        }

        socket.on('connect', () => {
            document.getElementById('connection-status').innerText = 'Connected (Socket ID: ' + socket.id + ')';
            document.getElementById('connection-status').style.color = 'green';
        });

        // ==========================================
        // VICTIM LOGIC
        // ==========================================
        function joinAsVictim() {
            const incidentId = getIncidentId();
            socket.emit('join_incident', { incidentId: incidentId, role: 'victim' });
            logToScreen(`Joined room "incident_${incidentId}" as Victim.`);
        }

        socket.on('victim_map_update', (data) => {
            logToScreen(`Helper is at Lat: ${data.lat.toFixed(5)}, Lng: ${data.lng.toFixed(5)}`);
        });

        // ==========================================
        // HELPER LOGIC
        // ==========================================
        function joinAsHelper() {
            const incidentId = getIncidentId();
            socket.emit('join_incident', { incidentId: incidentId, role: 'helper' });
            document.getElementById('helper-status').innerText = `Joined Room ${incidentId}. Ready to run.`;
        }

        function startRunning() {
            const incidentId = getIncidentId();
            let currentLat = 33.4255;
            let currentLng = -111.9400;

            document.getElementById('helper-status').innerText = 'GPS Status: Transmitting every 1s...';

            clearInterval(simulationInterval); // Clear any old intervals just in case

            simulationInterval = setInterval(() => {
                currentLat += 0.0001;
                currentLng += 0.0001;

                socket.emit('helper_location_update', {
                    incidentId: incidentId,
                    lat: currentLat,
                    lng: currentLng
                });
            }, 1000);
        }

        function logToScreen(message) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += message + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>

</html>
