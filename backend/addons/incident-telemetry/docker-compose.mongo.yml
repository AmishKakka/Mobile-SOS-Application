name: sos-telemetry

services:
  mongo:
    image: mongo:7.0
    container_name: sos-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mobile_sos
    volumes:
      - sos_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  sos_mongo_data:
