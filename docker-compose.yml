services:
  redis:
    image: redis:7-alpine
    container_name: mobile-sos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  json-server:
    image: node:20-bullseye
    container_name: mobile-sos-json-server
    working_dir: /data
    command: sh -c "npx --yes json-server@1.0.0-beta.3 --watch /data/db.json --host 0.0.0.0 --port 3001"
    volumes:
      - ./mobile-app/mock-api:/data
    ports:
      - "3001:3001"
    restart: unless-stopped

  mobile-app-web:
    image: node:20-bullseye
    container_name: mobile-sos-mobile-web
    working_dir: /app
    command: sh -c "npm install && npm run web -- --port 8081 --host lan"
    volumes:
      - ./mobile-app:/app
      - mobile_app_node_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    environment:
      - CI=1
      - EXPO_NO_TELEMETRY=1
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      redis:
        condition: service_healthy
      json-server:
        condition: service_started
    stdin_open: true
    tty: true

volumes:
  mobile_app_node_modules:
